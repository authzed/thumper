# This config builds nightly ("devel") images on every push to main. It mirrors
# .goreleaser.yaml but builds linux images only, omits the "latest" tag so that
# release images are never overwritten, and derives a commit-based version.
# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json

---
version: 2

builds:
  - id: "main-build"
    env:
      - "CGO_ENABLED=0"
    goos:
      - "linux"
    goarch:
      - "amd64"
      - "arm64"
    main: "./cmd/thumper/"
    dir: "."
    mod_timestamp: "{{ .CommitTimestamp }}"

kos:
  - &ko-defaults
    id: "dockerhub-ko"
    build: "main-build"
    platforms:
      - "linux/amd64"
      - "linux/arm64"
    repository: "authzed"
    tags:
      - "v{{ .Version }}"
    creation_time: "{{ .CommitTimestamp }}"
    ko_data_creation_time: "{{ .CommitTimestamp }}"
    sbom: "none"
    # This prevents it from adding the md5sum after the name of
    # the image
    base_import_paths: true
  - <<: *ko-defaults
    id: "ghcr-build"
    repository: "ghcr.io/authzed"
  - <<: *ko-defaults
    id: "quay-build"
    repository: "quay.io/authzed"

checksum:
  name_template: "checksums.txt"

# With --nightly, the version (and therefore the image tag) becomes
# "<next-patch>-<short-commit>", e.g. v0.1.1-1874ebe, which is unique per commit
# and never collides with a real release tag.
nightly:
  version_template: "{{ incpatch .Version }}-{{ .ShortCommit }}"
